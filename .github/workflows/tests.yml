name: tests

on:
  push:
    branches: [main]
  pull_request:

# PR mới đẩy thêm commit thì hủy lần chạy cũ
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    # windows-latest là môi trường thật của app; ubuntu bắt lỗi phụ thuộc
    # đường dẫn/encoding mà máy Windows che mất.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests
        # Tests chỉ chạm PySide6.QtCore (không dựng QApplication), nhưng đặt
        # offscreen để mọi import Qt về sau không cần display server.
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONIOENCODING: utf-8
        run: python -m pytest
