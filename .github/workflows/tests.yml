name: tests

on:
  push:
    branches: [main]
  pull_request:

# PR mới đẩy thêm commit thì hủy lần chạy cũ
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    # windows-latest là môi trường thật của app; ubuntu bắt lỗi phụ thuộc
    # đường dẫn/encoding mà máy Windows che mất.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      # QtWidgets cần các thư viện này ngay cả với platform "offscreen";
      # ui_main còn kéo theo QtMultimedia → libpulse.
      # Thiếu chúng, test GUI sẽ bị importorskip bỏ qua trong im lặng.
      - name: Install Qt system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libpulse0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      # tests/test_gui.py dùng importorskip: thiếu thư viện Qt thì nó lặng lẽ
      # bỏ qua và CI vẫn xanh. Chốt trước rằng import được, để không xanh giả.
      # Phải kiểm cả QtMultimedia — ui_main import nó, và nó cần libpulse.
      - name: Assert Qt modules import (GUI tests must not skip)
        run: |
          python -c "import PySide6.QtWidgets, PySide6.QtMultimedia; print('Qt OK')"

      - name: Run tests
        env:
          PYTHONIOENCODING: utf-8
        run: python -m pytest
